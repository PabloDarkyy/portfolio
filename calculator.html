<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Calculadora web simple creada por Pablo Bernal con Bootstrap y JavaScript.">
  <title>Calculadora Web — Pablo Bernal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  <nav class="navbar calculator-nav" aria-label="Navegación de la calculadora">
    <div class="container">
      <a class="navbar-brand" href="index.html">
         <img src="assets/wolfminimalism.png" alt="Pablo" class="calc-navbar-logo">
      </a>
      <a class="btn back-button" href="index.html#projects" aria-label="Volver a los proyectos"><span aria-hidden="true">←</span> Volver al portafolio</a>
    </div>
  </nav>

  <main class="calculator-page">
    <div class="container">
      <div class="calculator-heading text-center">
        <p class="calculator-eyebrow">Proyecto web · JavaScript vanilla</p>
        <h1>Calculadora Web</h1>
        <p>Operaciones básicas en una interfaz simple y cuidada.</p>
      </div>

      <section class="calculator-card mx-auto" aria-label="Calculadora">
        <div class="calculator-display" id="display" role="status" aria-live="polite">0</div>
        <div class="calculator-grid">
          <button class="calc-button clear-button" type="button" data-action="clear">C</button>
          <button class="calc-button operation-button" type="button" data-value="/" aria-label="Dividir">÷</button>

          <button class="calc-button" type="button" data-value="7">7</button>
          <button class="calc-button" type="button" data-value="8">8</button>
          <button class="calc-button" type="button" data-value="9">9</button>
          <button class="calc-button operation-button" type="button" data-value="*" aria-label="Multiplicar">×</button>

          <button class="calc-button" type="button" data-value="4">4</button>
          <button class="calc-button" type="button" data-value="5">5</button>
          <button class="calc-button" type="button" data-value="6">6</button>
          <button class="calc-button operation-button" type="button" data-value="-" aria-label="Restar">−</button>

          <button class="calc-button" type="button" data-value="1">1</button>
          <button class="calc-button" type="button" data-value="2">2</button>
          <button class="calc-button" type="button" data-value="3">3</button>
          <button class="calc-button operation-button" type="button" data-value="+" aria-label="Sumar">+</button>

          <button class="calc-button zero-button" type="button" data-value="0">0</button>
          <button class="calc-button" type="button" data-value=".">.</button>
          <button class="calc-button equal-button" type="button" data-action="calculate" aria-label="Calcular resultado">=</button>
        </div>
      </section>


    </div>
  </main>

  <script src="js/calculator.js"></script>
</body>
</html>
